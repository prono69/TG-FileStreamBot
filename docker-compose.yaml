name: TG File Stream Bot

services:
  fsb-run:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fsb
    restart: always
    volumes:
      - ./logs:/app/logs
      - ./fsb.env:/app/fsb.env
    ports:
      - "${PORT:-8038}:${PORT:-8038}"
    env_file:
      - path: ./fsb.env
        required: true
    networks:
      - nginx-proxy_default

networks:
  nginx-proxy_default:
    external: true